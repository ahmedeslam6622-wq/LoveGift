<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F5E6D3">
    <meta name="description" content="A jar of reasons why I love you">
    <title>Love Jar - For Mom</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <div class="card-container">
            <div class="card" id="reasonCard">
                <div class="card-background" id="cardBackground"></div>
                
                <div class="card-content">
                    <div class="card-text-wrapper">
                        <p class="card-reason" id="reasonText">
                            Loading your reasons...
                        </p>
                    </div>
                </div>

                <div class="swipe-hint" id="swipeHint">
                    <span class="hint-icon">👉</span>
                    <span class="hint-text">Tap to see more</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" id="prevBtn" aria-label="Previous">
                <span class="btn-icon">←</span>
            </button>
            
            <button class="btn btn-primary" id="moodBtn" aria-label="I need you">
                <span class="btn-icon">❤️</span>
                <span class="btn-text">I need you</span>
            </button>
            
            <button class="btn btn-secondary" id="nextBtn" aria-label="Next">
                <span class="btn-icon">→</span>
            </button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
